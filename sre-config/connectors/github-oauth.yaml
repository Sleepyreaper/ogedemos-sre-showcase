# GitHub OAuth Connector for ogeagenticops
#
# Uses OAuth browser flow — no PAT required.
# Apply via the SRE Agent portal: Builder → Connectors → Add GitHub.
# Or use scripts/setup-github.sh to apply via data plane with a PAT
# (fine-grained PAT with Contents:Read + Issues:Read/Write + Metadata:Read).
api_version: azuresre.ai/v1
kind: DataConnector
spec:
  name: github
  type: GitHubOAuth
  dataSource: github-oauth
